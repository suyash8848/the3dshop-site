<svg width="1254" height="1254" viewBox="0 0 1254 1254" xmlns="http://www.w3.org/2000/svg">
  <!-- THE 3D SHOP — vector logo recreation
       Ink navy "3" + brass "D" fused into a shopping-bag silhouette,
       with a rounded handle and two grommet eyelets. -->

  <!-- handle (bag strap), drawn first so the letterforms sit on top -->
  <path d="M 505 462
           C 505 350, 560 275, 627 275
           C 694 275, 749 350, 749 462"
        fill="none" stroke="#AB8A4C" stroke-width="34" stroke-linecap="round"/>

  <!-- "3" — ink navy, angular numeral with a chamfered top-left corner -->
  <path d="M 300 430
           L 560 430
           C 596 430, 617 452, 617 486
           C 617 518, 597 538, 566 545
           C 601 552, 623 574, 623 609
           C 623 654, 592 680, 545 680
           L 400 680
           L 400 609
           L 528 609
           C 546 609, 555 601, 555 588
           C 555 575, 546 567, 528 567
           L 420 567
           L 420 500
           L 528 500
           C 544 500, 552 493, 552 481
           C 552 469, 544 462, 528 462
           L 370 462
           L 300 500
           Z"
        fill="#14161F"/>
  <path d="M 300 750
           L 420 750
           L 420 813
           L 545 813
           C 592 813, 623 839, 623 884
           C 623 928, 592 954, 545 954
           L 340 954
           C 306 954, 282 933, 282 900
           L 350 900
           C 350 908, 356 915, 366 915
           L 538 915
           C 555 915, 563 908, 563 895
           C 563 882, 555 875, 538 875
           L 360 875
           L 360 780
           Z"
        fill="#14161F"/>

  <!-- grommet eyelets where the handle meets each letter -->
  <circle cx="520" cy="463" r="19" fill="#F7F4EE" stroke="#14161F" stroke-width="7"/>
  <circle cx="735" cy="463" r="19" fill="#F7F4EE" stroke="#AB8A4C" stroke-width="7"/>

  <!-- "D" — brass, rounded bowl fused to the 3's right edge -->
  <path d="M 645 430
           L 790 430
           C 895 430, 965 505, 965 605
           C 965 700, 965 780, 965 780
           C 965 880, 895 954, 790 954
           L 645 954
           L 645 813
           L 780 813
           C 825 813, 855 780, 855 730
           L 855 654
           C 855 604, 825 571, 780 571
           L 645 571
           Z"
        fill="#AB8A4C"/>
</svg>
